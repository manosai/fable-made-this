<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Fable Made This</title>
  <desc id="desc">A launch card for a gallery of 250 Claude Fable entries with the most visual artifacts first.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fff8ec"/>
      <stop offset="0.48" stop-color="#f4ead9"/>
      <stop offset="1" stop-color="#ecd7bc"/>
    </linearGradient>
    <radialGradient id="orbA" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#e98194" stop-opacity="0.44"/>
      <stop offset="1" stop-color="#e98194" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orbB" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#5c88b7" stop-opacity="0.34"/>
      <stop offset="1" stop-color="#5c88b7" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="22" stdDeviation="24" flood-color="#5b3b20" flood-opacity="0.16"/>
    </filter>
    <pattern id="grid" width="46" height="46" patternUnits="userSpaceOnUse">
      <path d="M46 0H0V46" fill="none" stroke="#241c16" stroke-opacity="0.055" stroke-width="1"/>
    </pattern>
    <clipPath id="rounded">
      <rect x="46" y="42" width="1108" height="546" rx="44"/>
    </clipPath>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <circle cx="1050" cy="46" r="270" fill="url(#orbA)"/>
  <circle cx="210" cy="20" r="300" fill="url(#orbB)"/>
  <circle cx="1014" cy="530" r="260" fill="#f6c16f" opacity="0.22"/>

  <g clip-path="url(#rounded)">
    <rect x="46" y="42" width="1108" height="546" rx="44" fill="#fffaf2" opacity="0.74" stroke="#573f2b" stroke-opacity="0.16"/>
    <g opacity="0.78" filter="url(#shadow)">
      <rect x="750" y="92" width="152" height="190" rx="26" fill="#fffdf8" stroke="#573f2b" stroke-opacity="0.13"/>
      <rect x="927" y="118" width="152" height="190" rx="26" fill="#fffdf8" stroke="#573f2b" stroke-opacity="0.13"/>
      <rect x="808" y="318" width="152" height="190" rx="26" fill="#fffdf8" stroke="#573f2b" stroke-opacity="0.13"/>
      <rect x="982" y="342" width="152" height="190" rx="26" fill="#fffdf8" stroke="#573f2b" stroke-opacity="0.13"/>
      <rect x="778" y="120" width="96" height="70" rx="18" fill="#e98194" opacity="0.22"/>
      <rect x="955" y="146" width="96" height="70" rx="18" fill="#5c88b7" opacity="0.22"/>
      <rect x="836" y="346" width="96" height="70" rx="18" fill="#7f9d72" opacity="0.24"/>
      <rect x="1010" y="370" width="96" height="70" rx="18" fill="#c76f3a" opacity="0.22"/>
      <path d="M790 240h72M967 266h72M848 466h72M1022 490h72" stroke="#241c16" stroke-opacity="0.18" stroke-width="10" stroke-linecap="round"/>
    </g>
  </g>

  <g transform="translate(98 102)">
    <text x="0" y="0" fill="#c76f3a" font-family="Avenir Next, Atkinson Hyperlegible, ui-sans-serif, system-ui, sans-serif" font-size="22" font-weight="900" letter-spacing="4">FABLE WINDOW GALLERY</text>
    <text x="0" y="142" fill="#211713" font-family="Avenir Next, Atkinson Hyperlegible, ui-sans-serif, system-ui, sans-serif" font-size="128" font-weight="900" letter-spacing="-12">Fable</text>
    <text x="0" y="248" fill="#211713" font-family="Avenir Next, Atkinson Hyperlegible, ui-sans-serif, system-ui, sans-serif" font-size="128" font-weight="900" letter-spacing="-12">Made This</text>
    <text x="4" y="314" fill="#624a3a" font-family="Avenir Next, Atkinson Hyperlegible, ui-sans-serif, system-ui, sans-serif" font-size="32" font-weight="650">250 entries, with the visual artifacts first</text>
    <g transform="translate(0 370)">
      <rect x="0" y="0" width="172" height="48" rx="24" fill="#fffdf8" stroke="#573f2b" stroke-opacity="0.18"/>
      <rect x="190" y="0" width="228" height="48" rx="24" fill="#fffdf8" stroke="#573f2b" stroke-opacity="0.18"/>
      <rect x="436" y="0" width="204" height="48" rx="24" fill="#fffdf8" stroke="#573f2b" stroke-opacity="0.18"/>
      <text x="24" y="32" fill="#624a3a" font-family="Avenir Next, Atkinson Hyperlegible, ui-sans-serif, system-ui, sans-serif" font-size="20" font-weight="800">games</text>
      <text x="214" y="32" fill="#624a3a" font-family="Avenir Next, Atkinson Hyperlegible, ui-sans-serif, system-ui, sans-serif" font-size="20" font-weight="800">CAD + engines</text>
      <text x="460" y="32" fill="#624a3a" font-family="Avenir Next, Atkinson Hyperlegible, ui-sans-serif, system-ui, sans-serif" font-size="20" font-weight="800">agents + apps</text>
    </g>
  </g>
</svg>
